short_bio: >-
  <p>
    I am a Ph.D. Candidate in Computer Science at
    <a href="https://www.cs.fsu.edu/" target="_blank">Florida State University</a>,
    advised by <a href="https://www.cs.fsu.edu/~liux/" target="_blank">Dr. Xiuwen Liu</a>.
    My research focuses on the <strong>robustness and explainability of large multimodal models</strong> —
    studying how microscopic input perturbations cascade through neural representations to cause
    failures in vision-language understanding, embodied navigation, and reasoning.
  </p>
  <p>
    I design mechanisms to detect and mitigate these vulnerabilities in Vision Transformers (ViTs),
    vision-language models (VLMs), and large language models (LLMs).
    My work has been published at top venues including <strong>IROS 2024</strong>, <strong>ISVC 2025</strong>,
    and <strong>WCCI 2026</strong>.
  </p>
  <p>
    In Summer 2025, I interned at <strong>Meta</strong> (Seattle, WA), optimizing large-scale feed ranking systems.
    I also hold an M.Sc. in Computer Science from FSU (GPA: 3.97/4.00) and a B.Sc. in CSE from
    <a href="https://www.buet.ac.bd/" target="_blank">Bangladesh University of Engineering and Technology (BUET)</a>.
  </p>

